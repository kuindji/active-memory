alg_name: GRACE
model_name: Qwen/Qwen2.5-1.5B

# device is required by the dataclass but is only used by upstream BaseEditor /
# apply_grace_to_model to build cuda:{device}. src/grace_engine.py bypasses those
# entry points and drives the GRACE class directly on torch.device("mps"), so
# this int is a placeholder.
device: 0

# Qwen2.5-1.5B has 28 transformer layers. Layer 7 is the plan's initial anchor,
# selected from the causal-tracing result cited in notes/phase0_4-plan.md.
# The upstream 7B yaml targets layer 18; the 1.5B optimum differs because the
# stack is shallower and the factual-recall circuit sits earlier relatively.
inner_params:
- model.layers[7].mlp.down_proj.weight

# Training
edit_lr: 1.0
n_iter: 50

# Codebook geometry
eps: 1.0
dist_fn: euc          # euc | mmd | cos
val_init: cold        # cold | warm
val_train: sgd        # sgd | pert (pert uses num_pert perturbations)
val_reg: None         # None | early
reg: early_stop
replacement: replace_last   # replace_last | replace_all | replace_prompt
eps_expand: coverage        # coverage | moving_avg | decay
num_pert: 8                 # only relevant when val_train == pert
dropout: 0.0
